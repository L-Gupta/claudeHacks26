<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeighborNote — UW-Madison</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            uwred: '#c5050c',
            uwdark: '#0a0a0a',
            uwgold: '#e8d5a3',
            uwlight: '#f7f7f7',
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; color: #f7f7f7; overflow-x: hidden; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pinDrop {
      0% { transform: translateY(-80px) scale(0.4); opacity: 0; }
      55% { transform: translateY(6px) scale(1.08); opacity: 1; }
      75% { transform: translateY(-4px) scale(0.96); }
      100% { transform: translateY(0) scale(1); }
    }
    @keyframes pinPulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(197,5,12,0.35)); }
      50% { filter: drop-shadow(0 0 14px rgba(197,5,12,0.85)); }
    }
    @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
    @keyframes ripple {
      0% { transform: scale(1); opacity: 0.5; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes slideUp {
      0% { transform: translateY(100%); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDown {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    @keyframes confettiPop {
      0% { transform: scale(0); opacity: 1; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes waveBar {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes recordPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(197,5,12,0.5); }
      50% { box-shadow: 0 0 0 18px rgba(197,5,12,0); }
    }
    @keyframes matchGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(197,5,12,0.3); }
      50% { box-shadow: 0 0 40px rgba(197,5,12,0.6); }
    }

    .fade-in { animation: fadeIn 0.6s ease both; }
    .fade-in-d1 { animation: fadeIn 0.6s ease 0.1s both; }
    .fade-in-d2 { animation: fadeIn 0.6s ease 0.2s both; }
    .fade-in-d3 { animation: fadeIn 0.6s ease 0.35s both; }
    .fade-in-d4 { animation: fadeIn 0.6s ease 0.5s both; }
    .pin-drop { animation: pinDrop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .pin-alive { animation: pinPulse 3s ease-in-out infinite; }
    .breathe { animation: breathe 2.5s ease-in-out infinite; }
    .record-active { animation: recordPulse 1s ease infinite; }
    .slide-up { animation: slideUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .match-glow { animation: matchGlow 2s ease-in-out infinite; }

    .ripple-ring {
      position: absolute; inset: -8px; border-radius: 50%;
      border: 3px solid #c5050c; animation: ripple 1s ease-out infinite;
    }
    .ripple-ring:nth-child(2) { animation-delay: 0.35s; }

    .waveform-canvas { image-rendering: optimizeSpeed; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #c5050c; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ── Constants ─────────────────────────────────────────── */
    const INTEREST_CATS = ['music','sports','gaming','art','food','tech','outdoors','film','fashion','academics'];
    const ROOM_W = 88, ROOM_H = 56, GAP = 7, START_X = 80;
    const USER_ROOM = '205';

    const MOCK_PINS = [
      { id: 'pin1', room: '204', label: 'The Music Kid',
        summary: "Chill, creative type who stays up late producing beats and is always down for late night ramen",
        features: { energy_level:0.4, introvert_extrovert_score:0.3, interests:['music','food','film'], tone_warmth:0.8, humor_score:0.6 },
        ts: Date.now(), audioSeed: 1 },
      { id: 'pin2', room: '212', label: 'The Extrovert Athlete',
        summary: "High energy sports fan who watches every Badgers game and is always looking for someone to throw a frisbee with",
        features: { energy_level:0.9, introvert_extrovert_score:0.95, interests:['sports','outdoors','food'], tone_warmth:0.7, humor_score:0.8 },
        ts: Date.now(), audioSeed: 2 },
      { id: 'pin3', room: '108', label: 'The Curious Builder',
        summary: "Quietly ambitious CS student who loves building random projects at 2am and will talk your ear off about video games",
        features: { energy_level:0.6, introvert_extrovert_score:0.5, interests:['tech','gaming','film'], tone_warmth:0.75, humor_score:0.7 },
        ts: Date.now(), audioSeed: 3 },
    ];

    const MEETUP_IDEAS = [
      (a,b) => `Grab cheese curds at the Memorial Union tonight at 8pm — ${a} and ${b}, your vibe alignment is off the charts. Bring your best hot take about campus food.`,
      (a,b) => `Meet at the Terrace chairs tomorrow at sunset — ${a}, ${b}, same energy, no excuses. Bonus points if someone brings a speaker.`,
      (a,b) => `Common room on your floor, tonight at 9pm — ${a} and ${b}, you're basically the same person and didn't even know it. Board games or just vibes, your call.`,
      (a,b) => `Study session at College Library tomorrow at 3pm, then Morris Ramen after — ${a} and ${b}, fuel the brains then fuel the soul.`,
      (a,b) => `Lakeshore Path walk tomorrow at 4pm — ${a} and ${b}, fresh air and good conversation, the algorithm has spoken.`,
    ];

    /* ── KNN (vanilla JS) ─────────────────────────────────── */
    function encodeVector(f) {
      const ih = INTEREST_CATS.map(c => f.interests.includes(c) ? 1 : 0);
      return [f.energy_level, f.introvert_extrovert_score, ...ih, f.tone_warmth, f.humor_score];
    }
    function euclidean(a, b) {
      let s = 0; for (let i = 0; i < a.length; i++) s += (a[i]-b[i])**2; return Math.sqrt(s);
    }
    function knnRank(userVec, pins, k = 3) {
      return pins
        .map(p => ({ pin: p, dist: euclidean(userVec, encodeVector(p.features)) }))
        .sort((a,b) => a.dist - b.dist)
        .slice(0, k)
        .map(d => d.pin);
    }

    /* ── Room Map Data ────────────────────────────────────── */
    function buildRooms() {
      const rooms = [];
      const row = (base, y, floor) => {
        for (let i = 0; i < 6; i++)
          rooms.push({ id: `${base+i}`, x: START_X + i*(ROOM_W+GAP), y, floor });
      };
      row(201, 38, 2); row(207, 134, 2);
      row(101, 256, 1); row(107, 352, 1);
      return rooms;
    }
    const ALL_ROOMS = buildRooms();
    function roomCenter(id) {
      const r = ALL_ROOMS.find(rm => rm.id === id);
      return r ? { x: r.x + ROOM_W/2, y: r.y + ROOM_H/2 } : { x: 400, y: 240 };
    }

    /* ── Mock Audio Generation ────────────────────────────── */
    function createMockAudioBuffer(ctx, seed) {
      const dur = 5, sr = ctx.sampleRate, len = dur * sr;
      const buf = ctx.createBuffer(1, len, sr);
      const d = buf.getChannelData(0);
      const base = 110 + seed * 45;
      for (let i = 0; i < len; i++) {
        const t = i / sr;
        const env = Math.max(0, Math.sin(t * Math.PI * (3 + seed*0.7)) * 0.6 + 0.4);
        const burst = Math.sin(t * 12 + seed) > -0.2 ? 1 : 0.15;
        const s = (Math.sin(2*Math.PI*base*t)*0.35 +
                   Math.sin(2*Math.PI*base*1.5*t + seed)*0.2 +
                   Math.sin(2*Math.PI*base*2.8*t)*0.1 +
                   (Math.random()*2-1)*0.08) * env * burst * 0.45;
        d[i] = s * (1 - Math.pow(2*t/dur - 1, 4));
      }
      return buf;
    }

    /* ── Mock Claude Analysis ─────────────────────────────── */
    function mockAnalyze(transcript) {
      const tl = (transcript || '').toLowerCase();
      const detect = (words) => words.some(w => tl.includes(w));
      return {
        energy_level: detect(['excited','love','awesome','hype','go']) ? 0.8 : detect(['chill','quiet','relax']) ? 0.3 : 0.55,
        introvert_extrovert_score: detect(['people','friend','party','hang']) ? 0.8 : detect(['alone','quiet','read','introvert']) ? 0.25 : 0.5,
        interests: INTEREST_CATS.filter(c => {
          const m = { music:['music','beat','song','guitar','piano','sing'],
            sports:['sports','game','basketball','football','run','gym','badger'],
            gaming:['game','play','video','nintendo','steam'],
            art:['art','draw','paint','design','creative'],
            food:['food','cook','eat','ramen','pizza','cheese'],
            tech:['code','tech','build','program','computer','hack'],
            outdoors:['outside','hike','lake','nature','walk'],
            film:['movie','film','watch','netflix','show'],
            fashion:['fashion','style','clothes','outfit'],
            academics:['study','class','learn','research','library'] };
          return (m[c]||[]).some(w => tl.includes(w));
        }),
        tone_warmth: detect(['love','friend','kind','warm','hey']) ? 0.85 : 0.6,
        humor_score: detect(['lol','haha','funny','joke','wild']) ? 0.8 : 0.5,
        summary: "Friendly student looking to connect with neighbors on the floor"
      };
    }

    async function analyzeWithClaude(transcript, apiKey) {
      if (!apiKey) return mockAnalyze(transcript);
      try {
        const r = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type':'application/json',
            'x-api-key': apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514', max_tokens: 400,
            system: "You are analyzing a student's voice note to extract personality and interest signals. Return ONLY a JSON object with these exact fields: energy_level (0-1), introvert_extrovert_score (0-1 where 1=extrovert), interests (array of strings from: music, sports, gaming, art, food, tech, outdoors, film, fashion, academics), tone_warmth (0-1), humor_score (0-1), summary (one sentence, warm and human). No markdown, no explanation, just the JSON.",
            messages: [{ role:'user', content: transcript }]
          })
        });
        const data = await r.json();
        return JSON.parse(data.content[0].text);
      } catch { return mockAnalyze(transcript); }
    }

    async function suggestMeetup(summaryA, summaryB, apiKey) {
      if (!apiKey) {
        const fn = MEETUP_IDEAS[Math.floor(Math.random()*MEETUP_IDEAS.length)];
        return fn('You', 'your neighbor');
      }
      try {
        const r = await fetch('https://api.anthropic.com/v1/messages', {
          method:'POST',
          headers: {
            'Content-Type':'application/json',
            'x-api-key': apiKey,
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true',
          },
          body: JSON.stringify({
            model:'claude-sonnet-4-20250514', max_tokens:200,
            system:"Generate one specific, warm, creative meetup suggestion for two UW-Madison dorm students who just matched. Max 2 sentences. Be specific about place and time. Reference UW-Madison landmarks.",
            messages:[{role:'user',content:`Student A: ${summaryA}\nStudent B: ${summaryB}\nSuggest a low-stakes meetup.`}]
          })
        });
        const data = await r.json();
        return data.content[0].text;
      } catch {
        const fn = MEETUP_IDEAS[Math.floor(Math.random()*MEETUP_IDEAS.length)];
        return fn('You','your neighbor');
      }
    }

    /* ── Bucky Badger SVG ─────────────────────────────────── */
    function BuckyBadger({ size = 48 }) {
      return (
        <svg viewBox="0 0 64 64" width={size} height={size} style={{ display:'inline-block', verticalAlign:'middle' }}>
          <ellipse cx="32" cy="34" rx="27" ry="25" fill="#4a4a4a" stroke="#333" strokeWidth="1.5"/>
          <ellipse cx="14" cy="16" rx="7" ry="9" fill="#4a4a4a" stroke="#333" strokeWidth="1" transform="rotate(-12,14,16)"/>
          <ellipse cx="50" cy="16" rx="7" ry="9" fill="#4a4a4a" stroke="#333" strokeWidth="1" transform="rotate(12,50,16)"/>
          <ellipse cx="14" cy="16" rx="4" ry="6" fill="#e8d5a3" transform="rotate(-12,14,16)"/>
          <ellipse cx="50" cy="16" rx="4" ry="6" fill="#e8d5a3" transform="rotate(12,50,16)"/>
          <path d="M7 34 Q14 14 26 11 Q24 22 22 34 Q18 46 12 50 Q6 46 7 34Z" fill="#1a1a1a"/>
          <path d="M57 34 Q50 14 38 11 Q40 22 42 34 Q46 46 52 50 Q58 46 57 34Z" fill="#1a1a1a"/>
          <path d="M32 8 Q36 22 35 38 Q34 50 32 54 Q30 50 29 38 Q28 22 32 8Z" fill="white"/>
          <ellipse cx="22" cy="30" rx="5" ry="5.5" fill="white"/>
          <ellipse cx="42" cy="30" rx="5" ry="5.5" fill="white"/>
          <circle cx="23" cy="30" r="2.5" fill="#c5050c"/>
          <circle cx="43" cy="30" r="2.5" fill="#c5050c"/>
          <circle cx="23.8" cy="29.2" r="0.8" fill="white"/>
          <circle cx="43.8" cy="29.2" r="0.8" fill="white"/>
          <ellipse cx="32" cy="42" rx="5.5" ry="3.5" fill="#222"/>
          <path d="M28 46 Q32 50 36 46" fill="none" stroke="#888" strokeWidth="1" strokeLinecap="round"/>
          <line x1="12" y1="32" x2="4" y2="30" stroke="#ddd" strokeWidth="0.8" strokeLinecap="round"/>
          <line x1="12" y1="35" x2="3" y2="36" stroke="#ddd" strokeWidth="0.8" strokeLinecap="round"/>
          <line x1="52" y1="32" x2="60" y2="30" stroke="#ddd" strokeWidth="0.8" strokeLinecap="round"/>
          <line x1="52" y1="35" x2="61" y2="36" stroke="#ddd" strokeWidth="0.8" strokeLinecap="round"/>
        </svg>
      );
    }

    /* ── Confetti Canvas ──────────────────────────────────── */
    function ConfettiOverlay({ active }) {
      const canvasRef = useRef(null);
      const particles = useRef([]);
      const raf = useRef(null);

      useEffect(() => {
        if (!active) { particles.current = []; return; }
        const cvs = canvasRef.current; if (!cvs) return;
        const ctx = cvs.getContext('2d');
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        const colors = ['#c5050c','#ffffff','#e8d5a3','#ff4444','#ffcccc'];
        particles.current = Array.from({ length: 180 }, () => ({
          x: Math.random()*cvs.width, y: Math.random()*-cvs.height,
          w: 6+Math.random()*8, h: 4+Math.random()*6,
          vx: (Math.random()-0.5)*4, vy: 2+Math.random()*5,
          rot: Math.random()*360, vr: (Math.random()-0.5)*12,
          color: colors[Math.floor(Math.random()*colors.length)],
          life: 1,
        }));
        let start = performance.now();
        function frame(now) {
          const dt = Math.min((now-start)/1000, 0.05); start = now;
          ctx.clearRect(0,0,cvs.width,cvs.height);
          let alive = false;
          for (const p of particles.current) {
            if (p.life <= 0) continue; alive = true;
            p.x += p.vx*60*dt; p.y += p.vy*60*dt; p.vy += 0.15;
            p.rot += p.vr*60*dt; p.life -= 0.004;
            ctx.save(); ctx.globalAlpha = Math.max(0, p.life);
            ctx.translate(p.x, p.y); ctx.rotate(p.rot*Math.PI/180);
            ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
            ctx.restore();
          }
          if (alive) raf.current = requestAnimationFrame(frame);
        }
        raf.current = requestAnimationFrame(frame);
        return () => { if (raf.current) cancelAnimationFrame(raf.current); };
      }, [active]);

      if (!active) return null;
      return <canvas ref={canvasRef} style={{ position:'fixed',inset:0,zIndex:9998,pointerEvents:'none' }}/>;
    }

    /* ── Waveform Visualizer ──────────────────────────────── */
    function WaveformCanvas({ analyser, playing, color = '#c5050c' }) {
      const canvasRef = useRef(null);
      const raf = useRef(null);

      useEffect(() => {
        const cvs = canvasRef.current; if (!cvs) return;
        const ctx = cvs.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        cvs.width = cvs.offsetWidth * dpr;
        cvs.height = cvs.offsetHeight * dpr;
        ctx.scale(dpr, dpr);
        const W = cvs.offsetWidth, H = cvs.offsetHeight;

        function draw() {
          ctx.clearRect(0, 0, W, H);
          if (analyser && playing) {
            const bufLen = analyser.frequencyBinCount;
            const data = new Uint8Array(bufLen);
            analyser.getByteTimeDomainData(data);
            const barW = W / bufLen * 2.5;
            for (let i = 0; i < bufLen; i++) {
              const v = data[i] / 255;
              const h = Math.max(2, v * H * 0.9);
              const x = i * barW;
              if (x > W) break;
              ctx.fillStyle = color;
              ctx.globalAlpha = 0.6 + v * 0.4;
              ctx.fillRect(x, (H - h) / 2, Math.max(1, barW - 1), h);
            }
            ctx.globalAlpha = 1;
          } else {
            const bars = 40;
            const barW = W / bars;
            for (let i = 0; i < bars; i++) {
              const h = 3 + Math.sin(Date.now()*0.002 + i*0.3) * 2;
              ctx.fillStyle = '#444';
              ctx.fillRect(i*barW + 1, (H-h)/2, barW-2, h);
            }
          }
          raf.current = requestAnimationFrame(draw);
        }
        raf.current = requestAnimationFrame(draw);
        return () => { if (raf.current) cancelAnimationFrame(raf.current); };
      }, [analyser, playing, color]);

      return <canvas ref={canvasRef} className="waveform-canvas" style={{ width:'100%', height:'100%', display:'block' }}/>;
    }

    /* ── Pin Marker SVG ───────────────────────────────────── */
    function PinMarker({ x, y, isNew, isUser, onClick, resonated }) {
      const fill = isUser ? '#e8d5a3' : resonated ? '#22c55e' : '#c5050c';
      return (
        <g
          className={`${isNew ? 'pin-drop' : ''} pin-alive`}
          style={{ cursor:'pointer', transformOrigin:`${x}px ${y}px` }}
          onClick={onClick}
        >
          <path
            d={`M${x},${y+2} C${x-10},${y-8} ${x-12},${y-22} ${x},${y-28} C${x+12},${y-22} ${x+10},${y-8} ${x},${y+2}Z`}
            fill={fill} stroke="white" strokeWidth="1.5"
          />
          <circle cx={x} cy={y-18} r="4.5" fill="white" opacity="0.9"/>
          {isUser && <text x={x} y={y-15} textAnchor="middle" fontSize="6" fill="#0a0a0a" fontWeight="700">♪</text>}
        </g>
      );
    }

    /* ── Floor Map ────────────────────────────────────────── */
    function FloorMap({ pins, userPin, onPinClick, sortedPinIds, resonatedPins }) {
      const [hovered, setHovered] = useState(null);
      const allPinItems = userPin ? [...pins, userPin] : pins;

      return (
        <svg viewBox="0 0 680 420" className="w-full" style={{ maxHeight: '52vh' }}>
          <defs>
            <linearGradient id="hallGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="#2a2a2a"/>
              <stop offset="50%" stopColor="#3a3a3a"/>
              <stop offset="100%" stopColor="#2a2a2a"/>
            </linearGradient>
          </defs>

          <rect x="0" y="0" width="680" height="420" rx="12" fill="#151515"/>

          <text x="42" y="22" fill="#e8d5a3" fontSize="11" fontWeight="700" opacity="0.7">WITTE HALL</text>

          {/* Floor 2 */}
          <text x="16" y="92" fill="#888" fontSize="9" fontWeight="600" transform="rotate(-90,16,92)">FLOOR 2</text>
          <rect x={START_X-4} y="98" width={6*(ROOM_W+GAP)-GAP+8} height="26" rx="3" fill="url(#hallGrad)" opacity="0.7"/>
          <text x={START_X + (6*(ROOM_W+GAP)-GAP)/2} y="115" textAnchor="middle" fill="#666" fontSize="7" letterSpacing="3">HALLWAY</text>

          {/* Floor 1 */}
          <text x="16" y="310" fill="#888" fontSize="9" fontWeight="600" transform="rotate(-90,16,310)">FLOOR 1</text>
          <rect x={START_X-4} y="316" width={6*(ROOM_W+GAP)-GAP+8} height="26" rx="3" fill="url(#hallGrad)" opacity="0.7"/>
          <text x={START_X + (6*(ROOM_W+GAP)-GAP)/2} y="333" textAnchor="middle" fill="#666" fontSize="7" letterSpacing="3">HALLWAY</text>

          <line x1="40" y1="230" x2="640" y2="230" stroke="#333" strokeWidth="1" strokeDasharray="4,4"/>

          {ALL_ROOMS.map(rm => {
            const hasPin = allPinItems.some(p => p.room === rm.id);
            const isUserRoom = rm.id === USER_ROOM && userPin;
            const isHov = hovered === rm.id;
            const rank = sortedPinIds.indexOf(rm.id);
            const isTopRanked = rank >= 0 && rank < 3;
            return (
              <g key={rm.id} onMouseEnter={() => setHovered(rm.id)} onMouseLeave={() => setHovered(null)}>
                <rect
                  x={rm.x} y={rm.y} width={ROOM_W} height={ROOM_H} rx="4"
                  fill={isUserRoom ? '#2a2518' : isHov ? '#252525' : '#1d1d1d'}
                  stroke={isTopRanked ? '#c5050c55' : isHov ? '#555' : '#2a2a2a'}
                  strokeWidth={isTopRanked ? 1.5 : 1}
                  style={{ transition:'all 300ms ease' }}
                />
                <text x={rm.x+ROOM_W/2} y={rm.y+ROOM_H/2+3} textAnchor="middle"
                  fill={hasPin ? '#e8d5a3' : '#555'} fontSize="10" fontWeight="600">{rm.id}</text>
              </g>
            );
          })}

          {allPinItems.map((pin, i) => {
            const c = roomCenter(pin.room);
            return (
              <PinMarker
                key={pin.id} x={c.x} y={c.y - 8}
                isNew={pin.isNew} isUser={pin.id === 'user'}
                resonated={resonatedPins.has(pin.id)}
                onClick={(e) => { e.stopPropagation(); onPinClick(pin); }}
              />
            );
          })}
        </svg>
      );
    }

    /* ── Voice Player Modal ───────────────────────────────── */
    function VoiceModal({ pin, onClose, onResonate, resonated, analyser, playing }) {
      if (!pin) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center p-4" style={{ background:'rgba(0,0,0,0.7)' }} onClick={onClose}>
          <div className="slide-up w-full max-w-md rounded-2xl p-6 relative"
            style={{ background:'linear-gradient(145deg, #1a1a1a, #111)' , border:'1px solid #2a2a2a' }}
            onClick={e => e.stopPropagation()}>

            <button onClick={onClose} className="absolute top-3 right-4 text-gray-500 hover:text-white text-xl transition-colors">&times;</button>

            <div className="text-center mb-4">
              <div className="inline-block px-3 py-1 rounded-full text-xs font-semibold mb-2"
                style={{ background:'#c5050c22', color:'#c5050c', border:'1px solid #c5050c44' }}>
                Room {pin.room} &middot; Anonymous
              </div>
              <p className="text-sm text-gray-400 mt-2 leading-relaxed italic">"{pin.summary}"</p>
            </div>

            <div className="rounded-xl p-3 mb-4" style={{ background:'#0a0a0a', height: 64 }}>
              <WaveformCanvas analyser={analyser} playing={playing} />
            </div>

            {pin.id !== 'user' && (
              <button
                onClick={() => onResonate(pin.id)}
                disabled={resonated}
                className="w-full py-3 rounded-xl font-bold text-lg transition-all duration-300"
                style={{
                  background: resonated ? '#22c55e' : '#c5050c',
                  color: 'white',
                  opacity: resonated ? 0.8 : 1,
                  transform: resonated ? 'scale(0.98)' : 'scale(1)',
                }}>
                {resonated ? '✓ Resonated' : 'Resonate ❤️'}
              </button>
            )}
          </div>
        </div>
      );
    }

    /* ── Match Card ───────────────────────────────────────── */
    function MatchCard({ pin, suggestion, onClose }) {
      if (!pin) return null;
      return (
        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4" style={{ background:'rgba(0,0,0,0.85)' }}>
          <div className="slide-up match-glow w-full max-w-sm rounded-3xl p-8 text-center relative"
            style={{ background:'linear-gradient(160deg, #1f0a0a, #0f0f0f)', border:'2px solid #c5050c55' }}>

            <div className="text-5xl mb-3">🎉</div>
            <h2 className="text-3xl font-black mb-1" style={{ color:'#c5050c' }}>It's a Match!</h2>
            <p className="text-gray-400 text-sm mb-5">You both resonated — here's the reveal</p>

            <div className="flex justify-around mb-6">
              <div>
                <div className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-2"
                  style={{ background:'#e8d5a322', border:'2px solid #e8d5a3' }}>
                  You
                </div>
                <div className="text-xs text-gray-400">Room {USER_ROOM}</div>
              </div>
              <div className="flex items-center text-2xl" style={{ color:'#c5050c' }}>❤️</div>
              <div>
                <div className="w-14 h-14 rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-2"
                  style={{ background:'#c5050c22', border:'2px solid #c5050c' }}>
                  {pin.label?.[4] || '?'}
                </div>
                <div className="text-xs text-gray-400">Room {pin.room}</div>
                <div className="text-xs text-white font-semibold mt-1">{pin.label}</div>
              </div>
            </div>

            <div className="rounded-xl p-4 mb-5" style={{ background:'#0a0a0a', border:'1px solid #222' }}>
              <p className="text-sm font-medium" style={{ color:'#e8d5a3' }}>☕ Meetup Suggestion</p>
              <p className="text-gray-300 text-sm mt-2 leading-relaxed">{suggestion}</p>
            </div>

            <button onClick={onClose}
              className="w-full py-3 rounded-xl font-bold text-white transition-all hover:brightness-110"
              style={{ background:'#c5050c' }}>
              Nice! Close
            </button>
          </div>
        </div>
      );
    }

    /* ── Record Button ────────────────────────────────────── */
    function RecordButton({ isRecording, time, onDown, onUp }) {
      return (
        <div className="flex flex-col items-center gap-3">
          <div className="relative">
            {isRecording && (
              <>
                <div className="ripple-ring" />
                <div className="ripple-ring" />
              </>
            )}
            <button
              onMouseDown={onDown} onMouseUp={onUp}
              onTouchStart={onDown} onTouchEnd={onUp}
              className={`relative w-20 h-20 rounded-full flex items-center justify-center text-white font-bold text-sm select-none
                ${isRecording ? 'record-active' : 'breathe'}`}
              style={{
                background: isRecording
                  ? 'radial-gradient(circle, #ff2222, #c5050c)'
                  : 'radial-gradient(circle, #c5050c, #8a0308)',
                border: '3px solid rgba(255,255,255,0.2)',
                touchAction: 'none',
              }}>
              {isRecording ? `${15 - time}s` : (
                <svg width="28" height="28" viewBox="0 0 24 24" fill="white">
                  <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                  <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
              )}
            </button>
          </div>
          <p className="text-xs text-gray-500 font-medium">
            {isRecording ? 'Release to stop' : 'Hold to record'}
          </p>
        </div>
      );
    }

    /* ── Settings Panel ───────────────────────────────────── */
    function Settings({ apiKey, setApiKey, open, setOpen }) {
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-start justify-center pt-20 p-4" style={{ background:'rgba(0,0,0,0.6)' }} onClick={() => setOpen(false)}>
          <div className="w-full max-w-sm rounded-2xl p-6 slide-up" style={{ background:'#1a1a1a', border:'1px solid #333' }} onClick={e => e.stopPropagation()}>
            <h3 className="font-bold mb-3" style={{ color:'#e8d5a3' }}>Settings</h3>
            <label className="text-xs text-gray-400 block mb-1">Claude API Key (optional — enables AI analysis)</label>
            <input
              type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
              placeholder="sk-ant-..."
              className="w-full rounded-lg px-3 py-2 text-sm bg-black border border-gray-700 text-white outline-none focus:border-uwred transition-colors"
            />
            <p className="text-xs text-gray-600 mt-2">Without a key, the app uses smart mock analysis for the demo.</p>
            <button onClick={() => setOpen(false)} className="mt-4 w-full py-2 rounded-lg font-semibold text-sm"
              style={{ background:'#c5050c', color:'white' }}>Done</button>
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════
       MAIN APP
       ══════════════════════════════════════════════════════════ */
    function App() {
      const [pins, setPins] = useState(MOCK_PINS);
      const [userPin, setUserPin] = useState(null);
      const [userFeatures, setUserFeatures] = useState(null);
      const [isRecording, setIsRecording] = useState(false);
      const [recordingTime, setRecordingTime] = useState(0);
      const [selectedPin, setSelectedPin] = useState(null);
      const [resonatedPins, setResonatedPins] = useState(new Set());
      const [matchedPin, setMatchedPin] = useState(null);
      const [showConfetti, setShowConfetti] = useState(false);
      const [meetupSuggestion, setMeetupSuggestion] = useState('');
      const [loaded, setLoaded] = useState(false);
      const [apiKey, setApiKey] = useState('');
      const [showSettings, setShowSettings] = useState(false);
      const [playingPinId, setPlayingPinId] = useState(null);
      const [showMatchCard, setShowMatchCard] = useState(false);

      const audioCtxRef = useRef(null);
      const analyserRef = useRef(null);
      const mediaRecRef = useRef(null);
      const recStreamRef = useRef(null);
      const chunksRef = useRef([]);
      const timerRef = useRef(null);
      const sourceRef = useRef(null);
      const playbackSourceRef = useRef(null);
      const userBlobUrlRef = useRef(null);

      useEffect(() => { setTimeout(() => setLoaded(true), 50); }, []);

      function getAudioCtx() {
        if (!audioCtxRef.current) audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
        return audioCtxRef.current;
      }

      /* ── Sort pins by KNN ── */
      const sortedPinIds = useMemo(() => {
        if (!userFeatures) return pins.map(p => p.room);
        const uv = encodeVector(userFeatures);
        return knnRank(uv, pins).map(p => p.room);
      }, [userFeatures, pins]);

      /* ── Recording ── */
      async function startRec() {
        try {
          const ctx = getAudioCtx();
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          recStreamRef.current = stream;

          const src = ctx.createMediaStreamSource(stream);
          const an = ctx.createAnalyser();
          an.fftSize = 256;
          src.connect(an);
          analyserRef.current = an;
          sourceRef.current = src;

          const mr = new MediaRecorder(stream);
          chunksRef.current = [];
          mr.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          mr.start();
          mediaRecRef.current = mr;

          setIsRecording(true);
          setRecordingTime(0);
          timerRef.current = setInterval(() => {
            setRecordingTime(prev => {
              if (prev >= 14) { stopRec(); return 15; }
              return prev + 1;
            });
          }, 1000);
        } catch (err) {
          console.error('Mic access denied:', err);
        }
      }

      function stopRec() {
        setIsRecording(false);
        clearInterval(timerRef.current);

        const mr = mediaRecRef.current;
        if (mr && mr.state !== 'inactive') {
          mr.onstop = async () => {
            const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
            userBlobUrlRef.current = URL.createObjectURL(blob);

            const transcript = "Hey, I love listening to music and playing video games. I'm kind of chill but always down to hang out and grab food. Looking for cool people on my floor!";
            const features = await analyzeWithClaude(transcript, apiKey);
            if (!features.interests || features.interests.length === 0) features.interests = ['music','gaming','food'];
            if (!features.summary) features.summary = "Friendly student looking to meet their neighbors";

            setUserFeatures(features);
            setUserPin({
              id: 'user', room: USER_ROOM, label: 'You',
              summary: features.summary, features, ts: Date.now(),
              blobUrl: userBlobUrlRef.current, isNew: true,
            });
          };
          mr.stop();
        }

        if (recStreamRef.current) {
          recStreamRef.current.getTracks().forEach(t => t.stop());
          recStreamRef.current = null;
        }
        if (sourceRef.current) { sourceRef.current.disconnect(); sourceRef.current = null; }
        analyserRef.current = null;
      }

      /* ── Playback ── */
      function playPin(pin) {
        setSelectedPin(pin);
        const ctx = getAudioCtx();
        const an = ctx.createAnalyser();
        an.fftSize = 256;
        analyserRef.current = an;

        if (pin.blobUrl) {
          const audio = new Audio(pin.blobUrl);
          const src = ctx.createMediaElementSource(audio);
          src.connect(an); an.connect(ctx.destination);
          audio.play();
          audio.onended = () => setPlayingPinId(null);
          playbackSourceRef.current = { audio, src };
        } else {
          const buf = createMockAudioBuffer(ctx, pin.audioSeed || 1);
          const src = ctx.createBufferSource();
          src.buffer = buf;
          src.connect(an); an.connect(ctx.destination);
          src.start();
          src.onended = () => setPlayingPinId(null);
          playbackSourceRef.current = { bufSrc: src };
        }
        setPlayingPinId(pin.id);
      }

      function stopPlayback() {
        if (playbackSourceRef.current) {
          const pb = playbackSourceRef.current;
          try { if (pb.audio) { pb.audio.pause(); pb.audio.currentTime = 0; } } catch {}
          try { if (pb.bufSrc) pb.bufSrc.stop(); } catch {}
          playbackSourceRef.current = null;
        }
        setPlayingPinId(null);
        analyserRef.current = null;
      }

      function handlePinClick(pin) {
        stopPlayback();
        playPin(pin);
      }

      function handleCloseModal() {
        stopPlayback();
        setSelectedPin(null);
      }

      /* ── Resonate & Match ── */
      function handleResonate(pinId) {
        setResonatedPins(prev => new Set([...prev, pinId]));

        setTimeout(() => {
          const matchPin = pins.find(p => p.id === pinId);
          if (matchPin) triggerMatch(matchPin);
        }, 2500);
      }

      async function triggerMatch(pin) {
        handleCloseModal();
        setShowConfetti(true);

        const suggestion = await suggestMeetup(
          userPin?.summary || "Friendly student",
          pin.summary,
          apiKey
        );
        setMeetupSuggestion(suggestion);
        setMatchedPin(pin);

        setTimeout(() => setShowMatchCard(true), 400);
        setTimeout(() => setShowConfetti(false), 4500);
      }

      function closeMatch() {
        setShowMatchCard(false);
        setMatchedPin(null);
        setMeetupSuggestion('');
      }

      if (!loaded) return null;

      return (
        <div className="min-h-screen flex flex-col" style={{ background:'linear-gradient(180deg, #0a0a0a 0%, #111 100%)' }}>

          {/* ── Header ── */}
          <header className="fade-in text-center py-5 px-4 relative" style={{ background:'linear-gradient(180deg, #c5050c 0%, #9a0409 100%)' }}>
            <div className="flex items-center justify-center gap-3 mb-1">
              <BuckyBadger size={44} />
              <h1 className="text-3xl font-black tracking-tight text-white" style={{ textShadow:'0 2px 8px rgba(0,0,0,0.3)' }}>
                NeighborNote
              </h1>
            </div>
            <p className="text-sm font-medium" style={{ color:'rgba(255,255,255,0.75)' }}>
              On, Wisconsin 🦡
            </p>
            <button onClick={() => setShowSettings(true)}
              className="absolute right-4 top-5 w-8 h-8 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 transition-colors text-white text-sm">
              ⚙
            </button>
          </header>

          {/* ── Floor Map ── */}
          <div className="fade-in-d2 flex-1 px-3 pt-4 pb-2 overflow-auto">
            <div className="max-w-2xl mx-auto">
              <div className="flex items-center justify-between mb-2 px-1">
                <h2 className="text-xs font-bold tracking-widest uppercase" style={{ color:'#e8d5a3' }}>
                  Witte Hall — Your Floor
                </h2>
                <span className="text-xs text-gray-600">Room {USER_ROOM}</span>
              </div>
              <div className="rounded-2xl overflow-hidden" style={{ border:'1px solid #222', background:'#151515' }}>
                <FloorMap
                  pins={pins}
                  userPin={userPin}
                  onPinClick={handlePinClick}
                  sortedPinIds={sortedPinIds}
                  resonatedPins={resonatedPins}
                />
              </div>
              {userFeatures && (
                <div className="fade-in mt-2 px-1">
                  <p className="text-xs text-gray-600">
                    📍 Pins sorted by compatibility — closest matches glow first (KNN k=3)
                  </p>
                </div>
              )}
            </div>
          </div>

          {/* ── Record Section ── */}
          <div className="fade-in-d4 pb-6 pt-2">
            {!userPin ? (
              <div className="flex flex-col items-center">
                <RecordButton
                  isRecording={isRecording}
                  time={recordingTime}
                  onDown={startRec}
                  onUp={() => { if (isRecording) stopRec(); }}
                />
                {isRecording && (
                  <div className="mt-3 rounded-xl overflow-hidden" style={{ width: 240, height: 48, background:'#111' }}>
                    <WaveformCanvas analyser={analyserRef.current} playing={isRecording} />
                  </div>
                )}
              </div>
            ) : (
              <p className="text-center text-sm text-gray-500 font-medium">
                ✅ Your note is live — tap a pin to listen & resonate
              </p>
            )}
          </div>

          {/* ── Modals & Overlays ── */}
          <VoiceModal
            pin={selectedPin}
            onClose={handleCloseModal}
            onResonate={handleResonate}
            resonated={selectedPin ? resonatedPins.has(selectedPin.id) : false}
            analyser={analyserRef.current}
            playing={!!playingPinId}
          />

          <ConfettiOverlay active={showConfetti} />

          {showMatchCard && matchedPin && (
            <MatchCard pin={matchedPin} suggestion={meetupSuggestion} onClose={closeMatch} />
          )}

          <Settings apiKey={apiKey} setApiKey={setApiKey} open={showSettings} setOpen={setShowSettings} />

          {/* ── Footer ── */}
          <footer className="text-center py-3 text-xs text-gray-700 border-t border-gray-900">
            NeighborNote &middot; UW-Madison &middot; Notes expire in 48h
          </footer>
        </div>
      );
    }

    /* ── Mount ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
